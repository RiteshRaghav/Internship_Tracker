spring.datasource.url=jdbc:mysql://localhost:3306/internship_tracker
spring.datasource.username=root
spring.datasource.password=7903664492
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# Logging Configuration
logging.level.com.Siddharth.internshiptracker=DEBUG
logging.level.org.springframework.security=DEBUG

# Allow circular references (temporary fix)
spring.main.allow-circular-references=true

# Flyway Configuration
spring.flyway.baseline-on-migrate=true

# File Upload Configuration
file.upload-dir=${FILE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:15MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

# Frontend base URL for building reset links
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# Mail configuration (set according to your SMTP provider)
# For Gmail, you may need an App Password and enable TLS
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Optional: from address used in emails
app.mail.from=${MAIL_FROM:no-reply@internship-tracker.local}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
app.frontend.base-url=http://localhost:3000